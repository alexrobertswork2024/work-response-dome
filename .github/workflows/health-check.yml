name: CI Health Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JavaScript Syntax
        run: |
          set -e
          find . -name "*.js" -not -path "*/node_modules/*" -print0 | while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done

      - name: Run Workspace Health Check
        run: node script.js
